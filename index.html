<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TASK::LOG — ตารางการบ้าน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<!-- Firebase SDK (compat version — simplest to use with plain JS, no build step needed) -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>

<style>
  :root {
    --void: #0A0E14;
    --panel: #131A22;
    --panel-border: #24333f;
    --text: #DCEFEA;
    --muted: #7C93A0;
    --dim: #4A5C68;
    --red: #FF6B6B;
    --amber: #FFC857;
    --green: #6EE7A8;
    --cyan: #5EEAD4;
    --violet: #B18CFF;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% -10%, #101820 0%, #0A0E14 55%, #05070A 100%);
    font-family: 'Chakra Petch', sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 24px 14px;
  }
  .mono { font-family: 'Space Mono', monospace; }
  .mini-spinner { width: 11px; height: 11px; border: 2px solid rgba(255,255,255,0.2); border-top-color: var(--violet); border-radius: 50%; display: inline-block; animation: spin 0.6s linear infinite; vertical-align: -1px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fade-in-soft { animation: fadeInSoft 0.35s ease; }
  @keyframes fadeInSoft { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } }

  .unlock-stage { position: relative; width: 130px; height: 130px; display: flex; align-items: center; justify-content: center; }
  .unlock-icon { font-size: 56px; display: inline-block; }
  .unlock-icon.shake { animation: lockShake 0.35s ease-in-out 2; }
  @keyframes lockShake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-9deg); } 75% { transform: rotate(9deg); } }
  .unlock-icon.pop { animation: lockPop 0.45s ease forwards; }
  @keyframes lockPop {
    0% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(110,231,168,0)); }
    35% { transform: scale(1.35); filter: drop-shadow(0 0 22px rgba(110,231,168,0.95)) drop-shadow(0 0 44px rgba(110,231,168,0.5)); }
    100% { transform: scale(1.15); opacity: 0; filter: drop-shadow(0 0 10px rgba(110,231,168,0.4)); }
  }
  .unlock-key { position: absolute; left: 50%; top: 50%; font-size: 26px; opacity: 0; transform: translate(-50%, -50%) rotate(-90deg) translateX(26px); }
  .unlock-key.turn { animation: keyTurn 0.5s ease forwards; }
  @keyframes keyTurn {
    0% { opacity: 0; transform: translate(-50%, -50%) rotate(-90deg) translateX(26px); }
    55% { opacity: 1; }
    100% { opacity: 1; transform: translate(-50%, -50%) rotate(25deg) translateX(0px); }
  }
  .unlock-key.fadeout { animation: keyFade 0.3s ease forwards; }
  @keyframes keyFade { to { opacity: 0; transform: translate(-50%, -50%) rotate(25deg) scale(0.7); } }
  .unlock-key.relock-in { animation: keyTurnReverse 0.5s ease forwards; }
  @keyframes keyTurnReverse {
    0% { opacity: 0; transform: translate(-50%, -50%) rotate(25deg) translateX(-26px); }
    55% { opacity: 1; }
    100% { opacity: 1; transform: translate(-50%, -50%) rotate(-90deg) translateX(0px); }
  }
  .unlock-icon.snap { animation: lockSnap 0.4s ease forwards; }
  @keyframes lockSnap {
    0% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(177,140,255,0)); }
    40% { transform: scale(1.3); filter: drop-shadow(0 0 20px rgba(177,140,255,0.9)) drop-shadow(0 0 40px rgba(177,140,255,0.5)); }
    100% { transform: scale(1); filter: drop-shadow(0 0 6px rgba(177,140,255,0.3)); }
  }
  .unlock-particles { position: absolute; inset: 0; pointer-events: none; }
  .unlock-particle { position: absolute; left: 50%; top: 50%; width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px 1px rgba(110,231,168,0.8); animation: unlockBurst 0.6s ease-out forwards; }
  @keyframes unlockBurst { to { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; } }
  .unlock-particle.converge { animation: unlockConverge 0.48s ease-in forwards; }
  @keyframes unlockConverge {
    0% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    55% { opacity: 1; }
    100% { transform: translate(0, 0) scale(1); opacity: 0; }
  }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 8px; }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: 'Chakra Petch', sans-serif; }
  input:focus { outline: 2px solid var(--green); outline-offset: 1px; }
  input::placeholder { color: var(--dim); }

  .frame {
    position: relative;
    width: 100%;
    max-width: 640px;
    border: 1px solid var(--panel-border);
    background: rgba(11,16,21,0.7);
  }
  .corner { position: absolute; width: 18px; height: 18px; border: 2px solid var(--green); pointer-events: none; }
  .content { padding: 26px 22px 30px; display: flex; flex-direction: column; }

  header { margin-bottom: 16px; }
  .header-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .brand { display: flex; align-items: center; gap: 10px; }
  h1 { font-weight: 700; font-size: 24px; margin: 0; letter-spacing: 0.08em; text-shadow: 0 0 14px rgba(110,231,168,0.35); }
  .subtitle { margin: 10px 0 0; font-size: 13px; color: var(--muted); line-height: 1.5; }

  .lock-btn { display: flex; align-items: center; gap: 6px; border: 1.5px solid var(--panel-border); border-radius: 4px; padding: 6px 12px; font-size: 11.5px; font-weight: 700; letter-spacing: 0.05em; background: transparent; color: var(--muted); }
  .lock-btn.unlocked { border-color: var(--violet); color: var(--violet); box-shadow: 0 0 12px rgba(177,140,255,0.35); }

  .banner { padding: 8px 14px; border-radius: 4px; font-size: 13px; margin-bottom: 14px; display: none; }
  .banner.error { background: rgba(255,107,107,0.12); border: 1px solid var(--red); color: var(--red); }
  .banner.success { background: rgba(110,231,168,0.12); border: 1px solid var(--green); color: var(--green); }
  .banner.show { display: block; }

  .search-bar { display: flex; align-items: center; gap: 8px; border: 1px solid var(--panel-border); border-radius: 4px; padding: 9px 12px; margin-bottom: 12px; background: rgba(255,255,255,0.02); }
  .save-confirm-overlay { position: fixed; inset: 0; background: rgba(5,7,10,0.5); z-index: 160; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; pointer-events: none; transition: opacity 0.25s ease, visibility 0.25s ease; }

  body.time-frozen .frame * { animation-play-state: paused !important; }

  .time-flash { position: fixed; inset: 0; background: radial-gradient(circle, #FFFFFF 0%, #C7F5FF 35%, #4DE8D4 65%, transparent 78%); opacity: 0; z-index: 249; pointer-events: none; }
  .time-flash.flash { animation: timeFlash 0.7s ease; }
  @keyframes timeFlash { 0% { opacity: 0; } 20% { opacity: 1; } 100% { opacity: 0; } }
  .time-flash.flash2 { animation: timeFlash2 0.9s ease; }
  @keyframes timeFlash2 { 0% { opacity: 0; } 12% { opacity: 1; } 100% { opacity: 0; } }

  .time-surge-overlay { position: fixed; inset: 0; z-index: 250; display: flex; align-items: center; justify-content: center; background: rgba(6,10,20,0); opacity: 0; visibility: hidden; pointer-events: none; overflow: hidden; transition: background 0.5s ease, opacity 0.5s ease, visibility 0.5s ease; }
  .time-surge-overlay.show { opacity: 1; visibility: visible; background: rgba(4,7,16,0.65); }

  .chrono-inbound-wrap { position: absolute; inset: 0; pointer-events: none; }

  .chrono-corner-wave { position: absolute; width: 60vmax; height: 5px; background: linear-gradient(90deg, transparent 0%, rgba(111,214,255,0.85) 55%, #EAF6FF 100%); filter: blur(1.5px) drop-shadow(0 0 12px rgba(111,214,255,0.85)); opacity: 0; }
  .chrono-corner-wave.tl { top: 0; left: 0; --ang: 45deg; transform-origin: 0% 50%; transform: rotate(45deg) scaleX(0); }
  .chrono-corner-wave.tr { top: 0; right: 0; --ang: 135deg; transform-origin: 100% 50%; transform: rotate(135deg) scaleX(0); }
  .chrono-corner-wave.bl { bottom: 0; left: 0; --ang: -45deg; transform-origin: 0% 50%; transform: rotate(-45deg) scaleX(0); }
  .chrono-corner-wave.br { bottom: 0; right: 0; --ang: -135deg; transform-origin: 100% 50%; transform: rotate(-135deg) scaleX(0); }
  .chrono-corner-wave.animate { animation: cornerWaveGrow 0.6s ease-in forwards; }
  @keyframes cornerWaveGrow {
    0% { opacity: 0; transform: rotate(var(--ang)) scaleX(0); }
    22% { opacity: 1; }
    65% { opacity: 0.85; transform: rotate(var(--ang)) scaleX(1); }
    100% { opacity: 0; transform: rotate(var(--ang)) scaleX(1); }
  }
  .chrono-inbound { position: absolute; left: 50%; top: 50%; width: 8px; height: 8px; border-radius: 50%; background: #BEE7FF; box-shadow: 0 0 10px 2px rgba(111,214,255,0.9); opacity: 0; }
  .chrono-inbound.animate { animation: chronoInbound 0.6s ease-in forwards; }
  @keyframes chronoInbound { 0% { transform: translate(var(--sx), var(--sy)) scale(1); opacity: 0.9; } 100% { transform: translate(0, 0) scale(0.2); opacity: 0; } }

  .chrono-rays { position: absolute; width: 60vmax; height: 60vmax; border-radius: 50%; background: conic-gradient(from 0deg, transparent 0deg, rgba(190,231,255,0.85) 10deg, transparent 35deg, transparent 130deg, rgba(124,147,255,0.7) 150deg, transparent 190deg, transparent 280deg, rgba(190,231,255,0.7) 300deg, transparent 330deg); opacity: 0; filter: blur(1px); }
  .chrono-rays.animate { animation: chronoRaysSpin 1.6s cubic-bezier(0.2, 0.7, 0.3, 1) forwards; }
  @keyframes chronoRaysSpin { 0% { transform: rotate(0deg) scale(0.15); opacity: 0; } 25% { opacity: 1; } 100% { transform: rotate(200deg) scale(1.4); opacity: 0; } }

  .chrono-bloom { position: absolute; width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, rgba(230,247,255,1) 0%, rgba(111,214,255,0.6) 35%, rgba(111,214,255,0) 70%); opacity: 0; }
  .chrono-bloom.animate { animation: chronoBloomPulse 1.4s cubic-bezier(0.15, 0.7, 0.3, 1) forwards; }
  @keyframes chronoBloomPulse { 0% { transform: scale(0.15); opacity: 0; } 30% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(9); opacity: 0; } }

  .chrono-ring { position: absolute; width: 16px; height: 16px; border: 3px solid; border-radius: 50%; opacity: 0; }
  .chrono-ring.animate { animation: chronoRingExpand 1.7s cubic-bezier(0.1, 0.6, 0.25, 1) forwards; }
  @keyframes chronoRingExpand { 0% { width: 16px; height: 16px; opacity: 1; } 65% { opacity: 0.35; } 100% { width: 220vmax; height: 220vmax; opacity: 0; } }

  .chrono-core { position: relative; width: 220px; height: 220px; opacity: 0; transform: scale(0.3) rotate(-30deg); }
  .chrono-core.animate { animation: chronoCorePop 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

  .lucky-overlay { position: fixed; inset: 0; z-index: 260; display: flex; align-items: center; justify-content: center; background: rgba(0,10,18,0); opacity: 0; visibility: hidden; pointer-events: none; overflow: hidden; transition: background 0.4s ease, opacity 0.4s ease, visibility 0.4s ease; }
  .lucky-overlay.show { opacity: 1; visibility: visible; background: rgba(0,18,30,0.78); }
  .coin-fall-wrap { position: absolute; inset: 0; pointer-events: none; }
  .coin-piece { position: absolute; bottom: -40px; font-size: 26px; filter: drop-shadow(0 0 6px rgba(120,220,255,0.75)); }
  .coin-piece.fall { animation: coinFallDown linear forwards; }
  @keyframes coinFallDown { 0% { transform: translateY(0) rotate(0deg); opacity: 0; } 10% { opacity: 0.9; } 100% { transform: translateY(-115vh) rotate(40deg); opacity: 0.7; } }

  .lucky-stage { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .lucky-text { font-size: 30px; font-weight: 800; letter-spacing: 0.18em; color: #7FE8FF; text-shadow: 0 0 20px rgba(127,232,255,0.9), 0 0 42px rgba(60,170,220,0.55); opacity: 0; }
  .lucky-text.animate { animation: luckyTextIn 0.5s ease forwards; }
  @keyframes luckyTextIn { from { opacity: 0; transform: translateY(-12px) scale(0.8); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .lucky-777 { display: flex; gap: 18px; }
  .lucky-digit { font-size: 60px; line-height: 1; min-width: 52px; text-align: center; filter: drop-shadow(0 0 16px rgba(127,232,255,0.65)); opacity: 0.15; }
  .lucky-digit.locked { animation: digitLock 0.4s ease forwards; }
  @keyframes digitLock { 0% { transform: scale(1.5); opacity: 0; } 60% { transform: scale(0.9); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }

  .meme-burst-overlay { position: fixed; inset: 0; z-index: 255; display: flex; align-items: center; justify-content: center; background: rgba(0,10,18,0); opacity: 0; visibility: hidden; pointer-events: none; overflow: hidden; transition: background 0.4s ease, opacity 0.4s ease, visibility 0.4s ease; }
  .meme-burst-overlay.show { opacity: 1; visibility: visible; background: rgba(0,12,20,0.55); }

  .gold-bloom { position: absolute; width: 90px; height: 90px; border-radius: 50%; opacity: 0; background: radial-gradient(circle, #F0FFFE 0%, #6FE8FF 32%, rgba(60,180,220,0.5) 55%, rgba(60,180,220,0) 72%); box-shadow: 0 0 60px 20px rgba(111,214,255,0.5); }
  .gold-bloom.animate { animation: goldBloomPulse 1.1s cubic-bezier(0.15, 0.7, 0.3, 1) forwards; }
  @keyframes goldBloomPulse { 0% { opacity: 0; transform: scale(0.15); } 25% { opacity: 1; } 100% { opacity: 0; transform: scale(9); } }

  .confetti-wrap { position: absolute; inset: 0; pointer-events: none; }
  .confetti-piece { position: absolute; left: 50%; top: 50%; font-size: 22px; opacity: 0; filter: drop-shadow(0 0 5px rgba(120,220,255,0.8)); }
  .confetti-piece.animate { animation: confettiBurst 1.2s cubic-bezier(0.15, 0.7, 0.3, 1) forwards; }
  @keyframes confettiBurst { 0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; } 100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(0.5); opacity: 0; } }

  body.theme-lucky777 { background: radial-gradient(ellipse at 50% -10%, #0a2a38 0%, #051a24 55%, #020d12 100%); --green: #4DE8D4; --violet: #2C7A9E; }
  body.theme-lucky777 h1 { text-shadow: 0 0 16px rgba(77,232,212,0.55); }
  body.theme-lucky777 .frame { border-color: rgba(77,232,212,0.3); }
  body.theme-lucky777 .brand-icon { display: inline-block; animation: fishSwim 2.2s ease-in-out infinite; filter: drop-shadow(0 0 8px rgba(77,232,212,0.65)); }
  @keyframes fishSwim { 0%, 100% { transform: translateX(0) rotate(0deg); } 25% { transform: translateX(3px) rotate(6deg); } 75% { transform: translateX(-3px) rotate(-6deg); } }

  .ocean-bg-decor { position: fixed; inset: 0; z-index: 0; opacity: 0; pointer-events: none; transition: opacity 1.5s ease; overflow: hidden; }
  body.theme-lucky777 .ocean-bg-decor { opacity: 1; }
  .bg-bubble { position: absolute; bottom: -30px; width: 10px; height: 10px; border-radius: 50%; background: rgba(120,220,255,0.12); border: 1px solid rgba(120,220,255,0.35); box-shadow: 0 0 8px rgba(120,220,255,0.3); }
  body.theme-lucky777 .bg-bubble { animation: bgBubbleRise 6s ease-in infinite; }
  @keyframes bgBubbleRise { 0% { transform: translateY(0) scale(0.8); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.4; } 100% { transform: translateY(-110vh) scale(1.3); opacity: 0; } }
  .n6 { color: #C6FF3D; text-shadow: 0 0 10px rgba(198,255,61,0.8); animation: n6Bob 1s ease-in-out infinite; }
  .n7 { color: #FF3DBD; text-shadow: 0 0 10px rgba(255,61,189,0.8); animation: n7Bob 1s ease-in-out infinite; }
  @keyframes n6Bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  @keyframes n7Bob { 0%, 100% { transform: translateY(-4px); } 50% { transform: translateY(0); } }
  .save-confirm-overlay.show { opacity: 1; visibility: visible; }
  .confirm-stage { width: 110px; height: 110px; border-radius: 50%; background: rgba(110,231,168,0.08); border: 1px solid rgba(110,231,168,0.3); display: flex; align-items: center; justify-content: center; }
  .confirm-icon { font-size: 56px; color: var(--green); display: inline-block; filter: drop-shadow(0 0 18px rgba(110,231,168,0.7)); animation: confirmPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
  @keyframes confirmPop { 0% { transform: scale(0) rotate(-20deg); opacity: 0; } 60% { transform: scale(1.25) rotate(4deg); opacity: 1; } 100% { transform: scale(1) rotate(0); opacity: 1; } }
  .search-bar.search-hit { animation: searchPulseGreen 0.55s ease; }
  @keyframes searchPulseGreen { 0% { box-shadow: 0 0 0 0 rgba(110,231,168,0); } 35% { box-shadow: 0 0 0 3px rgba(110,231,168,0.4); } 100% { box-shadow: 0 0 0 0 rgba(110,231,168,0); } }
  .search-bar.search-miss { animation: searchPulseRed 0.55s ease; }
  @keyframes searchPulseRed { 0% { box-shadow: 0 0 0 0 rgba(255,107,107,0); } 35% { box-shadow: 0 0 0 3px rgba(255,107,107,0.35); } 100% { box-shadow: 0 0 0 0 rgba(255,107,107,0); } }
  .search-bar input { flex: 1; background: transparent; border: none; color: var(--text); font-size: 14px; outline: none; }
  .search-bar button { border: none; background: transparent; color: var(--muted); padding: 2px; }

  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .chip { border: 1.5px solid var(--panel-border); border-radius: 4px; background: transparent; padding: 6px 11px; font-size: 12px; font-weight: 600; letter-spacing: 0.02em; color: var(--muted); }
  .chip.active { background: rgba(255,255,255,0.06); }

  .list-wrap { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; min-height: 160px; max-height: 720px; overflow-y: auto; padding-right: 2px; }
  .brand-icon { font-size: 22px; display: inline-block; animation: satelliteBlink 2.2s ease-in-out infinite; }
  @keyframes satelliteBlink { 0%, 100% { opacity: 1; filter: drop-shadow(0 0 6px rgba(110,231,168,0.6)); } 50% { opacity: 0.75; filter: drop-shadow(0 0 2px rgba(110,231,168,0.25)); } }
  @keyframes bob { 0%, 100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-4px) rotate(4deg); } }




  .key-mascot { font-size: 20px; display: inline-block; animation: keywiggle 1.8s ease-in-out infinite; }
  @keyframes keywiggle { 0%, 100% { transform: rotate(-8deg); } 50% { transform: rotate(8deg); } }
  .empty-state { color: var(--dim); font-size: 13.5px; text-align: center; padding: 30px 10px; }
  .empty-state-cute { color: var(--muted); font-size: 13.5px; text-align: center; padding: 30px 10px; }

  .task-row { display: flex; align-items: flex-start; gap: 14px; background: rgba(255,255,255,0.02); border: 1px solid var(--panel-border); border-radius: 6px; padding: 18px; transition: transform 0.15s ease, box-shadow 0.2s ease; cursor: pointer; animation: taskFadeIn 0.3s ease both; }
  .task-row:hover { transform: translateX(2px); }
  .task-row:active { transform: translateX(1px) scale(0.995); box-shadow: 0 0 0 1px rgba(255,255,255,0.15), inset 0 0 18px rgba(255,255,255,0.06); }
  @keyframes taskFadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .task-row.pulse-overdue { animation: taskFadeIn 0.3s ease both, overduePulse 1.8s ease-in-out infinite; }
  @keyframes overduePulse { 0%, 100% { filter: drop-shadow(0 0 0 rgba(255,107,107,0)); } 50% { filter: drop-shadow(0 0 9px rgba(255,107,107,0.55)); } }
  .task-row.just-changed { animation: taskFadeIn 0.3s ease both, rowGlowFilter 1.1s ease; }
  @keyframes rowGlowFilter { 0% { filter: drop-shadow(0 0 0 rgba(110,231,168,0)); } 30% { filter: drop-shadow(0 0 14px rgba(110,231,168,0.7)); } 100% { filter: drop-shadow(0 0 0 rgba(110,231,168,0)); } }
  .task-row.removing { animation: taskSlideOut 0.32s ease forwards !important; pointer-events: none; }
  @keyframes taskSlideOut { to { transform: translateX(24px); opacity: 0; } }

  .boot-overlay { position: fixed; inset: 0; background: var(--void); z-index: 200; display: flex; align-items: center; justify-content: center; overflow: hidden; transition: opacity 0.5s ease, visibility 0.5s ease; }
  .boot-overlay.hide { opacity: 0; visibility: hidden; pointer-events: none; }
  .boot-lines { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--green); line-height: 2; min-width: 240px; }
  .boot-line { opacity: 0; animation: bootIn 0.35s ease forwards; }
  @keyframes bootIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
  .boot-cursor { display: inline-block; width: 7px; height: 13px; background: var(--green); margin-left: 3px; vertical-align: middle; animation: blink 0.8s steps(1) infinite; }
  @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  .boot-scan { position: absolute; left: 0; right: 0; top: -80px; height: 80px; background: linear-gradient(180deg, transparent, rgba(110,231,168,0.22), transparent); animation: scanDown 1.4s ease-in-out infinite; }
  @keyframes scanDown { 0% { top: -80px; } 100% { top: 100%; } }

  .detail-card { position: relative; background: #0D1319; border: 1px solid var(--panel-border); border-radius: 6px; padding: 22px 20px; width: 100%; max-width: 380px; max-height: 80vh; overflow-y: auto; }
  .detail-close { position: absolute; top: 12px; right: 12px; border: none; background: transparent; color: var(--muted); font-size: 16px; padding: 4px; }
  .detail-tier { display: inline-block; font-size: 11.5px; font-weight: 700; padding: 3px 10px; border-radius: 3px; border: 1px solid; letter-spacing: 0.03em; margin-bottom: 10px; }
  .detail-subject { font-size: 13.5px; font-weight: 600; color: #9FB3BE; margin-bottom: 4px; }

<script>
/* ============================================================
   1) วางค่า firebaseConfig ของคุณตรงนี้ (ได้จากขั้นตอนที่ 4)
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyA08uSd1HWomhJNtavBgVUb-sc37kechB4",
  authDomain: "homework---tracker.firebaseapp.com",
  databaseURL: "https://homework---tracker-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "homework---tracker",
  storageBucket: "homework---tracker.firebasestorage.app",
  messagingSenderId: "634036362570",
  appId: "1:634036362570:web:e657135536baf5ecaab5b3"
};

/* ⚠️ เปลี่ยนรหัสนี้ก่อนแชร์ลิงก์จริง — รหัสปลดล็อกโหมดแก้ไข (กันฝั่งหน้าเว็บเท่านั้น) */
const EDIT_PASSCODE = "2569";

/* ============================================================
   2) โค้ดแอป — ไม่ต้องแก้ไขส่วนด้านล่างนี้
   ============================================================ */
let db, tasksRef;
let firebaseReady = false;

function initFirebase() {
  try {
    if (typeof firebase === "undefined") {
      throw new Error("Firebase SDK ยังโหลดไม่สำเร็จ (เช็คอินเทอร์เน็ต)");
    }
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    tasksRef = db.ref("tasks");
    firebaseReady = true;

    tasksRef.on("value", (snap) => {
      tasks = snap.val() || {};
      document.getElementById("syncLabel").textContent =
        "SYNC " + new Date().toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" });
      render();
    }, (err) => {
      showBanner("error", "เชื่อมต่อฐานข้อมูลไม่สำเร็จ — ตรวจสอบ firebaseConfig และ Rules");
      console.error(err);
    });
  } catch (err) {
    document.getElementById("syncLabel").textContent = "OFFLINE — เชื่อมต่อไม่สำเร็จ";
    showBanner("error", "โหลด Firebase ไม่สำเร็จ ตรวจสอบอินเทอร์เน็ตแล้วรีเฟรชหน้านี้อีกครั้ง");
    console.error(err);
  }
}

const TIER = {
  overdue: { label: "เลยกำหนด", color: "#FF6B6B" },
  urgent:  { label: "เร่งด่วน", color: "#FFC857" },
  soon:    { label: "ปกติ", color: "#6EE7A8" },
  later:   { label: "ยังมีเวลา", color: "#5EEAD4" },
  done:    { label: "เสร็จแล้ว", color: "#7C93A0" },
  none:    { label: "ไม่ระบุวันส่ง", color: "#7C93A0" },
};
const FILTER_KEYS = ["all", "overdue", "urgent", "soon", "later", "done"];

let tasks = {};          // { id: {subject, task, assignedDate, due, teacher, note, done} }
let filter = "all";
let search = "";
let editUnlocked = false;

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function todayIso() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function daysUntil(iso) {
  const today = new Date(); today.setHours(0,0,0,0);
  const due = new Date(iso + "T00:00:00");
  return Math.round((due - today) / 86400000);
}
function tierKey(iso) {
  if (!iso) return "none";
  const d = daysUntil(iso);
  if (d < 0) return "overdue";
  if (d <= 3) return "urgent";
  if (d <= 7) return "soon";
  return "later";
}
function fmtDate(iso) {
  if (!iso) return "";
  const d = new Date(iso + "T00:00:00");
  const days = ["อา","จ","อ","พ","พฤ","ศ","ส"];
  const months = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}
function daysLabel(iso) {
  if (!iso) return "";
  const d = daysUntil(iso);
  if (d < 0) return `เลยมา ${Math.abs(d)} วัน`;
  if (d === 0) return "ส่งวันนี้";
  return `เหลือ ${d} วัน`;
}
function showBanner(kind, msg) {
  const el = document.getElementById(kind === "error" ? "errorBanner" : "successBanner");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 3500);
}

// ---- Realtime listener: fires instantly for every viewer when data changes ----
function matchesSearch(t) {
  const s = search.trim().toLowerCase();
  if (!s) return true;
  const hay = [t.subject, t.teacher, t.assignedDate, t.due, fmtDate(t.assignedDate), fmtDate(t.due)]
    .filter(Boolean).join(" ").toLowerCase();
  return hay.includes(s);
}

function openDetail(id) {
  const t = tasks[id];
  if (!t) return;
  const key = tierKey(t.due);
  const tier = TIER[key];
  const dl = daysLabel(t.due);

  const rows = [];
  if (t.assignedDate) rows.push(["วันที่สั่ง", fmtDate(t.assignedDate)]);
  if (t.due) rows.push(["วันที่ส่ง", fmtDate(t.due)]);
  if (dl) rows.push(["สถานะเวลา", dl]);
  if (t.teacher) rows.push(["ครู/อาจารย์", t.teacher]);
  rows.push(["สถานะ", tier.label]);

  document.getElementById("detailContent").innerHTML = `
    <span class="detail-tier" style="color:${tier.color}; border-color:${tier.color};">${tier.label}</span>
    <div class="detail-subject">${escapeHtml(t.subject)}</div>
    <div class="detail-task">${escapeHtml(t.task)}</div>
    ${rows.map(([label, value]) => `
      <div class="detail-row">
        <span class="detail-row-label">${label}</span>
        <span class="detail-row-value">${escapeHtml(value)}</span>
      </div>
    `).join("")}
    ${t.note ? `<div class="detail-note-box">📝 ${escapeHtml(t.note)}</div>` : ""}
  `;

  const card = document.getElementById("detailCard");
  card.style.transition = "none";
  card.style.boxShadow = `0 0 40px 10px ${tier.color}77, 0 0 70px 20px ${tier.color}33`;
  document.getElementById("detailOverlay").classList.add("show");
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      card.style.transition = "box-shadow 1s ease";
      card.style.boxShadow = `0 0 16px 3px ${tier.color}55`;
    });
  });
}

function runBoot() {
  const overlay = document.getElementById("bootOverlay");
  const reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (reduceMotion) {
    overlay.classList.add("hide");
    return;
  }
  const lines = [
    "&gt; INITIALIZING TASK::LOG",
    "&gt; CONNECTING TO DATABASE...",
    "&gt; LOADING TASK LOGS...",
    "&gt; SYNCING RECORDS",
    "&gt; ACCESS GRANTED <span class=\"boot-cursor\"></span>",
  ];
  const el = document.getElementById("bootLines");
  lines.forEach((line, i) => {
    setTimeout(() => {
      const div = document.createElement("div");
      div.className = "boot-line";
      div.innerHTML = line;
      el.appendChild(div);
    }, i * 380);
  });
  setTimeout(() => {
    overlay.classList.add("hide");
  }, lines.length * 380 + 550);
}

let prevCounts = { all: 0, overdue: 0, urgent: 0, soon: 0, later: 0 };

function animateCount(el, from, to, duration) {
  if (!el || from === to) { if (el) el.textContent = to; return; }
  const start = performance.now();
  function step(now) {
    const progress = Math.min((now - start) / duration, 1);
    el.textContent = Math.round(from + (to - from) * progress);
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function render() {
  const entries = Object.entries(tasks).map(([id, t]) => ({ id, ...t }));

  const counts = { overdue:0, urgent:0, soon:0, later:0, none:0 };
  entries.forEach(t => { counts[tierKey(t.due)]++; });

  // chips — render with previous counts first, then animate to new values
  const chipRow = document.getElementById("chipRow");
  chipRow.innerHTML = `
    <button class="chip ${filter==='all'?'active':''}" data-filter="all" style="border-color:${filter==='all'?'#DCEFEA':'#24333f'}; color:${filter==='all'?'#DCEFEA':'#7C93A0'};">ทั้งหมด <b data-count-key="all">${prevCounts.all}</b></button>
    ${["overdue","urgent","soon","later"].map(k => {
      const t = TIER[k]; const active = filter===k;
      return `<button class="chip ${active?'active':''}" data-filter="${k}" style="border-color:${t.color}; color:${t.color}; ${active?`box-shadow:0 0 10px ${t.color}55; background:${t.color}18;`:''}">${t.label} <b data-count-key="${k}">${prevCounts[k]||0}</b></button>`;
    }).join("")}
  `;
  const newCounts = { all: entries.length, ...counts };
  chipRow.querySelectorAll("[data-count-key]").forEach(el => {
    const k = el.dataset.countKey;
    animateCount(el, prevCounts[k] || 0, newCounts[k] || 0, 400);
  });
  prevCounts = newCounts;

  // list
  const filtered = entries
    .filter(t => filter === "all" ? true : tierKey(t.due) === filter)
    .filter(matchesSearch)
    .sort((a,b) => {
      if (!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
      const da = a.due ? daysUntil(a.due) : 9999;
      const db_ = b.due ? daysUntil(b.due) : 9999;
      return da - db_;
    });

  const listWrap = document.getElementById("listWrap");
  if (filtered.length === 0) {
    const msg = entries.length === 0
      ? "ยังไม่มีงานเลย ว่างจัง~ มาเพิ่มงานแรกกันเถอะ"
      : "ไม่พบงานที่ตรงกับที่ค้นหา ลองเปลี่ยนคำดูนะ~";
    listWrap.innerHTML = `<div class="empty-state-cute">${msg}</div>`;
  } else {
    listWrap.innerHTML = filtered.map((t, idx) => {
      const key = tierKey(t.due);
      const tier = TIER[key];
      const dl = daysLabel(t.due);
      const delay = Math.min(idx * 40, 300);
      const isOverdue = key === "overdue";
      const isJustChanged = t.id === flashId;
      return `
      <div id="task-${t.id}" class="task-row ${isOverdue ? 'pulse-overdue' : ''} ${isJustChanged ? 'just-changed' : ''} ${t.pinned ? 'pinned-row' : ''}" style="box-shadow: inset 3px 0 0 ${tier.color};${t.pinned ? ' border-color: rgba(255,200,87,0.4);' : ''} animation-delay: ${delay}ms;" onclick="${editUnlocked ? `openEditForm('${t.id}')` : `openDetail('${t.id}')`}">
        <div style="flex:1; min-width:0;">
          <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
            <span class="tier-badge" style="color:${tier.color}; border-color:${tier.color};">${tier.label}</span>
            <span class="subject-tag">${escapeHtml(t.subject)}</span>
            ${t.pinned && !editUnlocked ? `<span title="ปักหมุด">📌</span>` : ""}
          </div>
          <div class="task-text">${escapeHtml(t.task)}</div>
          ${t.note ? `<div class="note-text">${escapeHtml(t.note)}</div>` : ""}
          <div class="date-row">
            ${t.assignedDate ? `<span class="date-chip"><span class="date-chip-label">สั่ง</span><span class="mono">${fmtDate(t.assignedDate)}</span></span>` : ""}
            ${t.due ? `<span class="date-chip" style="border-color:${tier.color}; color:${tier.color};"><span class="date-chip-label" style="color:${tier.color};">ส่ง</span><span class="mono">${fmtDate(t.due)}</span></span>` : ""}
          </div>
          <div class="meta-row">
            ${dl ? `<span class="mono">${dl}</span>` : ""}
            ${t.teacher ? `<span>🎓 ${escapeHtml(t.teacher)}</span>` : ""}
          </div>
        </div>
        ${editUnlocked ? `<button id="pin-${t.id}" class="pin-btn ${t.pinned ? 'pinned' : ''}" onclick="event.stopPropagation(); togglePin('${t.id}')" title="${t.pinned ? 'เลิกปักหมุด' : 'ปักหมุด'}">📌</button>` : ""}
        ${editUnlocked ? `<button class="delete-btn" onclick="event.stopPropagation(); removeTask('${t.id}')">🗑</button>` : ""}
      </div>`;
    }).join("");
  }
}

// ---- Actions (write to Firebase — every viewer sees the update instantly) ----
let flashId = null;

function removeTask(id) {
  if (!firebaseReady) { showBanner("error", "ยังไม่ได้เชื่อมต่อฐานข้อมูล ลองรีเฟรชหน้านี้"); return; }
  const el = document.getElementById(`task-${id}`);
  const doRemove = () => {
    tasksRef.child(id).remove()
      .then(() => showBanner("success", "ลบงานแล้ว 🗑✨"))
      .catch(() => showBanner("error", "ลบไม่สำเร็จ ลองใหม่อีกครั้ง"));
  };
  if (el) {
    el.classList.add("removing");
    setTimeout(doRemove, 320);
  } else {
    doRemove();
  }
}
function togglePin(id) {
  if (!firebaseReady) { showBanner("error", "ยังไม่ได้เชื่อมต่อฐานข้อมูล ลองรีเฟรชหน้านี้"); return; }
  const btn = document.getElementById(`pin-${id}`);
  if (btn) {
    btn.classList.remove("bump");
    void btn.offsetWidth;
    btn.classList.add("bump");
  }
  tasksRef.child(id).update({ pinned: !tasks[id].pinned })
    .catch(() => showBanner("error", "ปักหมุดไม่สำเร็จ ลองใหม่อีกครั้ง"));
}
let editingId = null;

function openEditForm(id) {
  const t = tasks[id];
  if (!t) return;
  editingId = id;
  document.getElementById("f_subject").value = t.subject || "";
  document.getElementById("f_assigned").value = t.assignedDate || todayIso();
  document.getElementById("f_due").value = t.due || "";
  document.getElementById("f_task").value = t.task || "";
  document.getElementById("f_teacher").value = t.teacher || "";
  document.getElementById("f_note").value = t.note || "";
  document.getElementById("formTitle").textContent = "แก้ไขงาน";
  document.getElementById("submitTaskBtn").textContent = "บันทึกการแก้ไข";
  document.getElementById("formCard").classList.add("show");
}

function resetFormToAddMode() {
  editingId = null;
  ["f_subject","f_task","f_due","f_teacher","f_note"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("f_assigned").value = todayIso();
  document.getElementById("formTitle").textContent = "NEW ENTRY";
  document.getElementById("submitTaskBtn").textContent = "บันทึกงาน";
}

function showSaveConfirm() {
  const reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (reduceMotion) {
    showBanner("success", "บันทึกสำเร็จแล้ว ✓");
    return;
  }
  const overlay = document.getElementById("saveConfirmOverlay");
  const icon = document.getElementById("confirmIcon");
  icon.style.animation = "none";
  void icon.offsetWidth;
  icon.style.animation = "";
  overlay.classList.add("show");
  setTimeout(() => overlay.classList.remove("show"), 800);
}

function saveTask() {
  if (!firebaseReady) { showBanner("error", "ยังไม่ได้เชื่อมต่อฐานข้อมูล ลองรีเฟรชหน้านี้"); return; }
  const subject = document.getElementById("f_subject").value.trim();
  const task = document.getElementById("f_task").value.trim();
  if (!subject || !task) { showBanner("error", "กรุณากรอกวิชาและรายละเอียดงาน"); return; }
  const fields = {
    subject, task,
    assignedDate: document.getElementById("f_assigned").value,
    due: document.getElementById("f_due").value,
    teacher: document.getElementById("f_teacher").value.trim(),
    note: document.getElementById("f_note").value.trim(),
  };

  const armFlash = (id) => {
    flashId = id;
    setTimeout(() => { flashId = null; render(); }, 1300);
  };

  if (editingId) {
    const id = editingId;
    tasksRef.child(id).update(fields)
      .then(() => {
        showSaveConfirm();
        armFlash(id);
        resetFormToAddMode();
        document.getElementById("formCard").classList.remove("show");
      })
      .catch((err) => {
        showBanner("error", "แก้ไขไม่สำเร็จ — ตรวจสอบการเชื่อมต่อหรือ Firebase Rules");
        console.error(err);
      });
  } else {
    const ref = tasksRef.push({ ...fields, pinned: false, createdAt: Date.now() });
    armFlash(ref.key);
    ref.then(() => {
        showSaveConfirm();
        resetFormToAddMode();
        document.getElementById("formCard").classList.remove("show");
      })
      .catch((err) => {
        showBanner("error", "บันทึกไม่สำเร็จ — ตรวจสอบการเชื่อมต่อหรือ Firebase Rules");
        console.error(err);
      });
  }
}

// ---- UI wiring ----
document.getElementById("chipRow").addEventListener("click", (e) => {
  const btn = e.target.closest("[data-filter]");
  if (!btn) return;
  filter = btn.dataset.filter;
  render();
});
document.getElementById("searchInput").addEventListener("input", (e) => {
  search = e.target.value;
  document.getElementById("searchClear").style.display = search ? "inline" : "none";
  render();
  const bar = document.getElementById("searchBar");
  bar.classList.remove("search-hit", "search-miss");
  if (search.trim()) {
    const hasMatch = Object.values(tasks).some(matchesSearch);
    void bar.offsetWidth;
    bar.classList.add(hasMatch ? "search-hit" : "search-miss");
    setTimeout(() => bar.classList.remove("search-hit", "search-miss"), 550);
  }
});
document.getElementById("searchClear").addEventListener("click", () => {
  search = ""; document.getElementById("searchInput").value = "";
  document.getElementById("searchClear").style.display = "none";
  render();
});
document.getElementById("addBtn").addEventListener("click", () => {
  resetFormToAddMode();
  document.getElementById("formCard").classList.add("show");
});
document.getElementById("closeFormBtn").addEventListener("click", () => {
  resetFormToAddMode();
  document.getElementById("formCard").classList.remove("show");
});
document.getElementById("submitTaskBtn").addEventListener("click", saveTask);

document.getElementById("lockBtn").addEventListener("click", () => {
  if (editUnlocked) {
    runRelockAnimation();
  } else {
    document.getElementById("gateOverlay").classList.add("show");
    document.getElementById("gateInput").value = "";
    document.getElementById("gateError").classList.remove("show");
    document.getElementById("gateInput").focus();
  }
});
document.getElementById("gateCancelBtn").addEventListener("click", () => {
  document.getElementById("gateOverlay").classList.remove("show");
});
function spawnUnlockParticles(mode) {
  const wrap = document.getElementById("unlockParticles");
  wrap.innerHTML = "";
  const count = 14;
  const color = mode === "converge" ? "var(--violet)" : "var(--green)";
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + (Math.random() * 0.4 - 0.2);
    const dist = 45 + Math.random() * 35;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    const p = document.createElement("span");
    p.className = mode === "converge" ? "unlock-particle converge" : "unlock-particle";
    p.style.background = color;
    p.style.setProperty("--dx", `${dx}px`);
    p.style.setProperty("--dy", `${dy}px`);
    p.style.animationDelay = `${Math.random() * 0.08}s`;
    wrap.appendChild(p);
  }
}

function applyViewerModeState() {
  editUnlocked = false;
  document.getElementById("lockBtnContent").textContent = "🔒 VIEWER";
  document.getElementById("lockBtn").classList.remove("unlocked");
  document.getElementById("subtitleText").textContent = "โหมดผู้ชม — ข้อมูลอัปเดตแบบเรียลไทม์";
  document.getElementById("addBtn").style.display = "none";
  resetFormToAddMode();
  document.getElementById("formCard").classList.remove("show");
  render();
}

function runRelockAnimation() {
  const reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (reduceMotion) { applyViewerModeState(); return; }

  const icon = document.getElementById("unlockIcon");
  const key = document.getElementById("unlockKey");
  icon.textContent = "🔓";
  icon.className = "unlock-icon";
  key.className = "unlock-key relock-in";
  document.getElementById("unlockParticles").innerHTML = "";
  document.getElementById("unlockOverlay").classList.add("show");

  requestAnimationFrame(() => {
    spawnUnlockParticles("converge");
  });

  setTimeout(() => {
    icon.textContent = "🔒";
    icon.classList.add("snap");
    key.classList.add("fadeout");
  }, 480);

  setTimeout(() => {
    document.getElementById("unlockOverlay").classList.remove("show");
    applyViewerModeState();
  }, 850);
}


function submitGate() {
  const val = document.getElementById("gateInput").value;
  if (val !== EDIT_PASSCODE) {
    document.getElementById("gateError").classList.add("show");
    return;
  }
  document.getElementById("gateOverlay").classList.remove("show");

  const applyUnlockedState = () => {
    editUnlocked = true;
    document.getElementById("lockBtnContent").textContent = "🔓 EDIT MODE";
    document.getElementById("lockBtn").classList.add("unlocked");
    document.getElementById("subtitleText").textContent = "คุณอยู่ในโหมดแก้ไข — ผู้ที่เปิดลิงก์นี้จะเห็นแบบผู้ชมเท่านั้น";
    const addBtn = document.getElementById("addBtn");
    addBtn.style.display = "flex";
    addBtn.classList.add("fade-in-soft");
    render();
  };

  const reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (reduceMotion) {
    applyUnlockedState();
    return;
  }

  const icon = document.getElementById("unlockIcon");
  const key = document.getElementById("unlockKey");
  icon.textContent = "🔒";
  icon.className = "unlock-icon";
  key.className = "unlock-key";
  document.getElementById("unlockParticles").innerHTML = "";
  document.getElementById("unlockOverlay").classList.add("show");

  requestAnimationFrame(() => {
    icon.classList.add("shake");
    key.classList.add("turn");
  });

  setTimeout(() => {
    icon.textContent = "🔓";
    icon.classList.remove("shake");
    icon.classList.add("pop");
    key.classList.add("fadeout");
    spawnUnlockParticles();
  }, 520);

  setTimeout(() => {
    document.getElementById("unlockOverlay").classList.remove("show");
    applyUnlockedState();
  }, 980);
}
document.getElementById("gateSubmitBtn").addEventListener("click", submitGate);
document.getElementById("gateInput").addEventListener("keydown", (e) => { if (e.key === "Enter") submitGate(); });

// init
document.getElementById("detailCloseBtn").addEventListener("click", () => {
  document.getElementById("detailOverlay").classList.remove("show");
});
document.getElementById("detailOverlay").addEventListener("click", (e) => {
  if (e.target.id === "detailOverlay") document.getElementById("detailOverlay").classList.remove("show");
});

document.getElementById("f_assigned").value = todayIso();
render();
initFirebase();
runBoot();

function freezeUIBriefly(ms) {
  document.body.classList.add("time-frozen");
  setTimeout(() => document.body.classList.remove("time-frozen"), ms);
}

function applyLuckyTheme() {
  document.body.classList.add("theme-lucky777");
  const icon = document.getElementById("brandIcon");
  if (icon) icon.textContent = "🐠";
}

function spawnInboundParticles() {
  const wrap = document.getElementById("chronoInboundWrap");
  wrap.innerHTML = "";
  const count = 24;
  const maxDist = Math.max(window.innerWidth, window.innerHeight) * 0.75;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = maxDist * (0.5 + Math.random() * 0.5);
    const sx = Math.cos(angle) * dist;
    const sy = Math.sin(angle) * dist;
    const p = document.createElement("span");
    p.className = "chrono-inbound";
    p.style.setProperty("--sx", `${sx}px`);
    p.style.setProperty("--sy", `${sy}px`);
    p.style.animationDelay = `${Math.random() * 0.25}s`;
    wrap.appendChild(p);
  }
  requestAnimationFrame(() => {
    wrap.querySelectorAll(".chrono-inbound").forEach(el => el.classList.add("animate"));
  });
}

function spawnFallingCoins(durationMs) {
  const wrap = document.getElementById("coinFallWrap");
  wrap.innerHTML = "";
  const count = 22;
  for (let i = 0; i < count; i++) {
    const c = document.createElement("span");
    c.className = "coin-piece fall";
    c.textContent = "🫧";
    c.style.left = `${Math.random() * 96}%`;
    const fallDuration = 1.4 + Math.random() * 1.1;
    c.style.animationDuration = `${fallDuration}s`;
    c.style.animationDelay = `${Math.random() * (durationMs / 1000) * 0.6}s`;
    wrap.appendChild(c);
  }
}

function spawnConfetti() {
  const wrap = document.getElementById("confettiWrap");
  wrap.innerHTML = "";
  const count = 34;
  const maxDist = Math.max(window.innerWidth, window.innerHeight) * 0.68;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = maxDist * (0.35 + Math.random() * 0.65);
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist + 60; // slight downward drift for a falling-coin feel
    const rot = Math.random() * 720 - 360;
    const size = 16 + Math.random() * 20;
    const p = document.createElement("span");
    p.className = "confetti-piece";
    p.textContent = "🫧";
    p.style.fontSize = `${size}px`;
    p.style.setProperty("--dx", `${dx}px`);
    p.style.setProperty("--dy", `${dy}px`);
    p.style.setProperty("--rot", `${rot}deg`);
    p.style.animationDelay = `${Math.random() * 0.12}s`;
    wrap.appendChild(p);
  }
  requestAnimationFrame(() => {
    wrap.querySelectorAll(".confetti-piece").forEach(el => el.classList.add("animate"));
  });
}

function runBurst() {
  document.getElementById("memeBurstOverlay").classList.add("show");
  document.getElementById("timeFlash").classList.add("flash");

  const bloom = document.getElementById("goldBloom");
  bloom.classList.remove("animate");
  void bloom.offsetWidth;
  bloom.classList.add("animate");
  spawnConfetti();

  setTimeout(() => {
    document.getElementById("timeFlash").classList.add("flash2");
  }, 150);

  setTimeout(applyLuckyTheme, 500);

  setTimeout(() => {
    document.getElementById("memeBurstOverlay").classList.remove("show");
    document.getElementById("timeFlash").classList.remove("flash", "flash2");
  }, 1500);
}

function runTimeShift() {
  const reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (reduceMotion) {
    applyLuckyTheme();
    return;
  }

  // Phase 0 (0–3200ms): everything freezes, coins rain down, "LUCKY 777" locks in like a slot machine
  freezeUIBriefly(4800);
  document.getElementById("luckyOverlay").classList.add("show");
  spawnFallingCoins(2000);

  setTimeout(() => {
    document.getElementById("luckyText").classList.add("animate");
  }, 300);

  ["luckyDigit1", "luckyDigit2", "luckyDigit3"].forEach((id, i) => {
    setTimeout(() => {
      document.getElementById(id).classList.add("locked");
    }, 700 + i * 300);
  });

  // Phase 1 (3200ms onward): gold comic-burst + coin explosion, then theme applied
  setTimeout(() => {
    document.getElementById("luckyOverlay").classList.remove("show");
    runBurst();
  }, 3200);
}

setTimeout(runTimeShift, 5000);
