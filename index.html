<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TASK::LOG — ตารางการบ้าน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<!-- Firebase SDK (compat version — simplest to use with plain JS, no build step needed) -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>

<style>
  :root {
    --void: #0A0E14;
    --panel: #131A22;
    --panel-border: #24333f;
    --text: #DCEFEA;
    --muted: #7C93A0;
    --dim: #4A5C68;
    --red: #FF6B6B;
    --amber: #FFC857;
    --green: #6EE7A8;
    --cyan: #5EEAD4;
    --violet: #B18CFF;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% -10%, #101820 0%, #0A0E14 55%, #05070A 100%);
    font-family: 'Chakra Petch', sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 24px 14px;
  }
  .mono { font-family: 'Space Mono', monospace; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 8px; }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: 'Chakra Petch', sans-serif; }
  input:focus { outline: 2px solid var(--green); outline-offset: 1px; }
  input::placeholder { color: var(--dim); }

  .frame {
    position: relative;
    width: 100%;
    max-width: 640px;
    border: 1px solid var(--panel-border);
    background: rgba(11,16,21,0.7);
  }
  .corner { position: absolute; width: 18px; height: 18px; border: 2px solid var(--green); pointer-events: none; }
  .content { padding: 26px 22px 30px; display: flex; flex-direction: column; }

  header { margin-bottom: 16px; }
  .header-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .brand { display: flex; align-items: center; gap: 10px; }
  h1 { font-weight: 700; font-size: 24px; margin: 0; letter-spacing: 0.08em; text-shadow: 0 0 14px rgba(110,231,168,0.35); }
  .subtitle { margin: 10px 0 0; font-size: 13px; color: var(--muted); line-height: 1.5; }

  .lock-btn { display: flex; align-items: center; gap: 6px; border: 1.5px solid var(--panel-border); border-radius: 4px; padding: 6px 12px; font-size: 11.5px; font-weight: 700; letter-spacing: 0.05em; background: transparent; color: var(--muted); }
  .lock-btn.unlocked { border-color: var(--violet); color: var(--violet); box-shadow: 0 0 12px rgba(177,140,255,0.35); }

  .banner { padding: 8px 14px; border-radius: 4px; font-size: 13px; margin-bottom: 14px; display: none; }
  .banner.error { background: rgba(255,107,107,0.12); border: 1px solid var(--red); color: var(--red); }
  .banner.success { background: rgba(110,231,168,0.12); border: 1px solid var(--green); color: var(--green); }
  .banner.show { display: block; }

  .search-bar { display: flex; align-items: center; gap: 8px; border: 1px solid var(--panel-border); border-radius: 4px; padding: 9px 12px; margin-bottom: 12px; background: rgba(255,255,255,0.02); }
  .search-bar input { flex: 1; background: transparent; border: none; color: var(--text); font-size: 14px; outline: none; }
  .search-bar button { border: none; background: transparent; color: var(--muted); padding: 2px; }

  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .chip { border: 1.5px solid var(--panel-border); border-radius: 4px; background: transparent; padding: 6px 11px; font-size: 12px; font-weight: 600; letter-spacing: 0.02em; color: var(--muted); }
  .chip.active { background: rgba(255,255,255,0.06); }

  .list-wrap { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; min-height: 160px; max-height: 720px; overflow-y: auto; padding-right: 2px; }
  .alien-mascot { font-size: 24px; display: inline-block; animation: bob 2.4s ease-in-out infinite; filter: drop-shadow(0 0 6px rgba(110,231,168,0.5)); }
  @keyframes bob { 0%, 100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-4px) rotate(4deg); } }

  .star { position: absolute; border-radius: 50%; background: #DCEFEA; animation: twinkle 3s ease-in-out infinite; pointer-events: none; }
  @keyframes twinkle { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.9; } }

  .empty-alien { font-size: 34px; display: block; margin-bottom: 8px; animation: bob 2.4s ease-in-out infinite; }
  .empty-state { color: var(--dim); font-size: 13.5px; text-align: center; padding: 30px 10px; }
  .empty-state-cute { color: var(--muted); font-size: 13.5px; text-align: center; padding: 30px 10px; }

  .task-row { display: flex; align-items: flex-start; gap: 14px; background: rgba(255,255,255,0.02); border: 1px solid var(--panel-border); border-radius: 6px; padding: 18px; transition: transform 0.15s ease; }
  .task-row:hover { transform: translateX(2px); }
  .task-row.done { opacity: 0.55; }

  .status-circle { width: 28px; height: 28px; min-width: 28px; border-radius: 50%; border: 2px solid var(--panel-border); display: flex; align-items: center; justify-content: center; margin-top: 2px; background: transparent; }
  .status-circle.done { border-color: var(--green); background: rgba(110,231,168,0.15); color: var(--green); }
  .status-circle:not(.editable) { cursor: default; }
  .status-circle.editable { cursor: pointer; }

  .tier-badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 3px; border: 1px solid; letter-spacing: 0.03em; }
  .subject-tag { font-size: 13.5px; font-weight: 600; color: #9FB3BE; }
  .task-text { font-size: 16px; margin-top: 7px; color: var(--text); font-weight: 500; line-height: 1.5; }
  .task-text.done { text-decoration: line-through; }
  .note-text { font-size: 13px; color: var(--muted); margin-top: 3px; }

  .date-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .date-chip { display: flex; align-items: center; gap: 5px; border: 1px solid var(--panel-border); border-radius: 3px; padding: 3px 9px; font-size: 12px; color: #9FB3BE; }
  .date-chip-label { font-size: 10.5px; font-weight: 700; color: var(--dim); letter-spacing: 0.03em; }
  .meta-row { font-size: 12px; color: var(--muted); margin-top: 8px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }

  .delete-btn { border: none; background: transparent; color: var(--dim); padding: 4px; margin-top: 2px; }

  .add-btn { display: flex; align-items: center; justify-content: center; gap: 8px; background: rgba(110,231,168,0.12); color: var(--green); border: 1.5px solid var(--green); border-radius: 4px; padding: 12px 16px; font-size: 14px; font-weight: 700; letter-spacing: 0.03em; }

  .form-card { background: rgba(255,255,255,0.03); border: 1px solid var(--panel-border); border-radius: 4px; padding: 16px; display: none; }
  .form-card.show { display: block; }
  .form-header { display: flex; justify-content: space-between; align-items: center; font-weight: 700; margin-bottom: 10px; color: var(--violet); font-size: 12.5px; letter-spacing: 0.05em; }
  .form-header button { border: none; background: transparent; color: var(--muted); }
  .field-label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.04em; margin-bottom: 4px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .form-input { border: 1px solid var(--panel-border); border-radius: 4px; padding: 9px 11px; font-size: 14px; width: 100%; color: var(--text); background: rgba(255,255,255,0.02); }
  .submit-btn { margin-top: 12px; width: 100%; background: var(--green); color: var(--void); border: none; border-radius: 4px; padding: 10px 16px; font-size: 14px; font-weight: 700; letter-spacing: 0.03em; }

  .footer-row { display: flex; align-items: center; gap: 10px; justify-content: center; margin-top: 6px; }
  .ping-wrap { position: relative; width: 10px; height: 10px; display: inline-flex; align-items: center; justify-content: center; }
  .ping-core { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  .ping-ring { position: absolute; width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: ping 1.8s cubic-bezier(0,0,0.2,1) infinite; }
  @keyframes ping { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(2.6); opacity: 0; } }

  .overlay { position: fixed; inset: 0; background: rgba(5,7,10,0.75); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 50; }
  .overlay.show { display: flex; }
  .gate-card { position: relative; background: #0D1319; border: 1px solid var(--panel-border); border-radius: 4px; padding: 26px 22px; width: 100%; max-width: 300px; box-shadow: 0 0 40px rgba(177,140,255,0.15); }
  .gate-title { font-weight: 700; font-size: 17px; margin: 0 0 4px; letter-spacing: 0.06em; }
  .gate-subtitle { font-size: 12.5px; color: var(--muted); margin: 0 0 14px; }
  .gate-input { border: 1px solid var(--panel-border); border-radius: 4px; padding: 10px 12px; font-size: 15px; width: 100%; background: rgba(255,255,255,0.02); color: var(--text); letter-spacing: 0.3em; }
  .gate-error { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }
  .gate-error.show { display: block; }
  .gate-actions { display: flex; gap: 8px; margin-top: 12px; }
  .gate-cancel { flex: 1; border: 1px solid var(--panel-border); background: transparent; color: var(--muted); border-radius: 4px; padding: 9px 12px; font-size: 13.5px; }
  .gate-submit { flex: 1; border: none; background: var(--violet); color: var(--void); border-radius: 4px; padding: 9px 12px; font-size: 13.5px; font-weight: 700; }

  @media (prefers-reduced-motion: reduce) {
    .task-row, .ping-ring, .alien-mascot, .star { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="star" style="width:2px; height:2px; top:50%; left:95%; animation-delay:2.1s;" aria-hidden="true"></div>

<div class="frame">
  <span class="corner" style="top:6px;left:6px;border-right:none;border-bottom:none;"></span>
  <span class="corner" style="top:6px;right:6px;border-left:none;border-bottom:none;"></span>

<script>
/* ============================================================
   1) วางค่า firebaseConfig ของคุณตรงนี้ (ได้จากขั้นตอนที่ 4)
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyA08uSd1HWomhJNtavBgVUb-sc37kechB4",
  authDomain: "homework---tracker.firebaseapp.com",
  databaseURL: "https://homework---tracker-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "homework---tracker",
  storageBucket: "homework---tracker.firebasestorage.app",
  messagingSenderId: "634036362570",
  appId: "1:634036362570:web:e657135536baf5ecaab5b3"
};

/* ⚠️ เปลี่ยนรหัสนี้ก่อนแชร์ลิงก์จริง — รหัสปลดล็อกโหมดแก้ไข (กันฝั่งหน้าเว็บเท่านั้น) */
const EDIT_PASSCODE = "2569";

/* ============================================================
   2) โค้ดแอป — ไม่ต้องแก้ไขส่วนด้านล่างนี้
   ============================================================ */
let db, tasksRef;
let firebaseReady = false;

function initFirebase() {
  try {
    if (typeof firebase === "undefined") {
      throw new Error("Firebase SDK ยังโหลดไม่สำเร็จ (เช็คอินเทอร์เน็ต)");
    }
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    tasksRef = db.ref("tasks");
    firebaseReady = true;

    tasksRef.on("value", (snap) => {
      tasks = snap.val() || {};
      document.getElementById("syncLabel").textContent =
        "SYNC " + new Date().toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" });
      render();
    }, (err) => {
      showBanner("error", "เชื่อมต่อฐานข้อมูลไม่สำเร็จ — ตรวจสอบ firebaseConfig และ Rules");
      console.error(err);
    });
  } catch (err) {
    document.getElementById("syncLabel").textContent = "OFFLINE — เชื่อมต่อไม่สำเร็จ";
    showBanner("error", "โหลด Firebase ไม่สำเร็จ ตรวจสอบอินเทอร์เน็ตแล้วรีเฟรชหน้านี้อีกครั้ง");
    console.error(err);
  }
}

const TIER = {
  overdue: { label: "เลยกำหนด", color: "#FF6B6B" },
  urgent:  { label: "เร่งด่วน", color: "#FFC857" },
  soon:    { label: "ปกติ", color: "#6EE7A8" },
  later:   { label: "ยังมีเวลา", color: "#5EEAD4" },
  done:    { label: "เสร็จแล้ว", color: "#7C93A0" },
  none:    { label: "ไม่ระบุวันส่ง", color: "#7C93A0" },
};
const FILTER_KEYS = ["all", "overdue", "urgent", "soon", "later", "done"];

let tasks = {};          // { id: {subject, task, assignedDate, due, teacher, note, done} }
let filter = "all";
let search = "";
let editUnlocked = false;

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function todayIso() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function daysUntil(iso) {
  const today = new Date(); today.setHours(0,0,0,0);
  const due = new Date(iso + "T00:00:00");
  return Math.round((due - today) / 86400000);
}
function tierKey(iso, done) {
  if (done) return "done";
  if (!iso) return "none";
  const d = daysUntil(iso);
  if (d < 0) return "overdue";
  if (d <= 3) return "urgent";
  if (d <= 7) return "soon";
  return "later";
}
function fmtDate(iso) {
  if (!iso) return "";
  const d = new Date(iso + "T00:00:00");
  const days = ["อา","จ","อ","พ","พฤ","ศ","ส"];
  const months = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}
function daysLabel(iso, done) {
  if (done || !iso) return "";
  const d = daysUntil(iso);
  if (d < 0) return `เลยมา ${Math.abs(d)} วัน`;
  if (d === 0) return "ส่งวันนี้";
  return `เหลือ ${d} วัน`;
}
function showBanner(kind, msg) {
  const el = document.getElementById(kind === "error" ? "errorBanner" : "successBanner");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 3500);
}

// ---- Realtime listener: fires instantly for every viewer when data changes ----
function matchesSearch(t) {
  const s = search.trim().toLowerCase();
  if (!s) return true;
  const hay = [t.subject, t.teacher, t.assignedDate, t.due, fmtDate(t.assignedDate), fmtDate(t.due)]
    .filter(Boolean).join(" ").toLowerCase();
  return hay.includes(s);
}

function render() {
  const entries = Object.entries(tasks).map(([id, t]) => ({ id, ...t }));

  const counts = { overdue:0, urgent:0, soon:0, later:0, done:0, none:0 };
  entries.forEach(t => { counts[tierKey(t.due, t.done)]++; });

  // chips
  const chipRow = document.getElementById("chipRow");
  chipRow.innerHTML = `
    <button class="chip ${filter==='all'?'active':''}" data-filter="all" style="border-color:${filter==='all'?'#DCEFEA':'#24333f'}; color:${filter==='all'?'#DCEFEA':'#7C93A0'};">ทั้งหมด <b>${entries.length}</b></button>
    ${["overdue","urgent","soon","later"].map(k => {
      const t = TIER[k]; const active = filter===k;
      return `<button class="chip ${active?'active':''}" data-filter="${k}" style="border-color:${t.color}; color:${t.color}; ${active?`box-shadow:0 0 10px ${t.color}55; background:${t.color}18;`:''}">${t.label} <b>${counts[k]||0}</b></button>`;
    }).join("")}
  `;

  // list
  const filtered = entries
    .filter(t => filter === "all" ? true : tierKey(t.due, t.done) === filter)
    .filter(matchesSearch)
    .sort((a,b) => {
      if (!!a.done !== !!b.done) return a.done ? 1 : -1;
      const da = a.due ? daysUntil(a.due) : 9999;
      const db_ = b.due ? daysUntil(b.due) : 9999;
      return da - db_;
    });

  const listWrap = document.getElementById("listWrap");
  if (filtered.length === 0) {
    const msg = entries.length === 0
      ? "ยังไม่มีงานเลย ว่างจัง~ มาเพิ่มงานแรกกันเถอะ"
      : "ไม่พบงานที่ตรงกับที่ค้นหา ลองเปลี่ยนคำดูนะ~";
    listWrap.innerHTML = `<div class="empty-state-cute"><span class="empty-alien">👽</span>${msg}</div>`;
  } else {
    listWrap.innerHTML = filtered.map(t => {
      const key = tierKey(t.due, t.done);
      const tier = TIER[key];
      const dl = daysLabel(t.due, t.done);
      return `
      <div class="task-row ${t.done?'done':''}" style="box-shadow: inset 3px 0 0 ${tier.color};">
        <span class="status-circle ${t.done?'done':''} ${editUnlocked?'editable':''}" ${editUnlocked?`onclick="toggleDone('${t.id}')"`:""}>${t.done?'✓':''}</span>
        <div style="flex:1; min-width:0;">
          <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
            ${!t.done ? `<span class="tier-badge" style="color:${tier.color}; border-color:${tier.color};">${tier.label}</span>` : ""}
            <span class="subject-tag">${escapeHtml(t.subject)}</span>
          </div>
          <div class="task-text ${t.done?'done':''}">${escapeHtml(t.task)}</div>
          ${t.note ? `<div class="note-text">${escapeHtml(t.note)}</div>` : ""}
          <div class="date-row">
            ${t.assignedDate ? `<span class="date-chip"><span class="date-chip-label">สั่ง</span><span class="mono">${fmtDate(t.assignedDate)}</span></span>` : ""}
            ${t.due ? `<span class="date-chip" style="border-color:${tier.color}; color:${tier.color};"><span class="date-chip-label" style="color:${tier.color};">ส่ง</span><span class="mono">${fmtDate(t.due)}</span></span>` : ""}
          </div>
          <div class="meta-row">
            ${dl ? `<span class="mono">${dl}</span>` : ""}
            ${t.teacher ? `<span>🎓 ${escapeHtml(t.teacher)}</span>` : ""}
          </div>
        </div>
        ${editUnlocked ? `<button class="delete-btn" onclick="removeTask('${t.id}')">🗑</button>` : ""}
      </div>`;
    }).join("");
  }
}

// ---- Actions (write to Firebase — every viewer sees the update instantly) ----
function toggleDone(id) {
  if (!firebaseReady) { showBanner("error", "ยังไม่ได้เชื่อมต่อฐานข้อมูล ลองรีเฟรชหน้านี้"); return; }
  tasksRef.child(id).update({ done: !tasks[id].done })
    .catch(() => showBanner("error", "บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง"));
}
function removeTask(id) {
  if (!firebaseReady) { showBanner("error", "ยังไม่ได้เชื่อมต่อฐานข้อมูล ลองรีเฟรชหน้านี้"); return; }
  tasksRef.child(id).remove()
    .then(() => showBanner("success", "ลบงานแล้ว 🗑✨"))
    .catch(() => showBanner("error", "ลบไม่สำเร็จ ลองใหม่อีกครั้ง"));
}
function addTask() {
  if (!firebaseReady) { showBanner("error", "ยังไม่ได้เชื่อมต่อฐานข้อมูล ลองรีเฟรชหน้านี้"); return; }
  const subject = document.getElementById("f_subject").value.trim();
  const task = document.getElementById("f_task").value.trim();
  if (!subject || !task) { showBanner("error", "กรุณากรอกวิชาและรายละเอียดงาน"); return; }
  const newTask = {
    subject, task,
    assignedDate: document.getElementById("f_assigned").value,
    due: document.getElementById("f_due").value,
    teacher: document.getElementById("f_teacher").value.trim(),
    note: document.getElementById("f_note").value.trim(),
    done: false,
    createdAt: Date.now(),
  };
  tasksRef.push(newTask)
    .then(() => {
      showBanner("success", "บันทึกงานสำเร็จแล้ว 👽🎉");
      ["f_subject","f_task","f_due","f_teacher","f_note"].forEach(id => document.getElementById(id).value = "");
      document.getElementById("f_assigned").value = todayIso();
      document.getElementById("formCard").classList.remove("show");
    })
    .catch((err) => {
      showBanner("error", "บันทึกไม่สำเร็จ — ตรวจสอบการเชื่อมต่อหรือ Firebase Rules");
      console.error(err);
    });
}

// ---- UI wiring ----
document.getElementById("chipRow").addEventListener("click", (e) => {
  const btn = e.target.closest("[data-filter]");
  if (!btn) return;
  filter = btn.dataset.filter;
  render();
});
document.getElementById("searchInput").addEventListener("input", (e) => {
  search = e.target.value;
  document.getElementById("searchClear").style.display = search ? "inline" : "none";
  render();
});
document.getElementById("searchClear").addEventListener("click", () => {
  search = ""; document.getElementById("searchInput").value = "";
  document.getElementById("searchClear").style.display = "none";
  render();
});
document.getElementById("addBtn").addEventListener("click", () => {
  document.getElementById("f_assigned").value = document.getElementById("f_assigned").value || todayIso();
  document.getElementById("formCard").classList.add("show");
});
document.getElementById("closeFormBtn").addEventListener("click", () => {
  document.getElementById("formCard").classList.remove("show");
});
document.getElementById("submitTaskBtn").addEventListener("click", addTask);

document.getElementById("lockBtn").addEventListener("click", () => {
  if (editUnlocked) {
    editUnlocked = false;
    document.getElementById("lockBtn").textContent = "🔒 VIEWER";
    document.getElementById("lockBtn").classList.remove("unlocked");
    document.getElementById("subtitleText").textContent = "โหมดผู้ชม — ข้อมูลอัปเดตแบบเรียลไทม์";
    document.getElementById("addBtn").style.display = "none";
    document.getElementById("formCard").classList.remove("show");
    render();
  } else {
    document.getElementById("gateOverlay").classList.add("show");
    document.getElementById("gateInput").value = "";
    document.getElementById("gateError").classList.remove("show");
    document.getElementById("gateInput").focus();
  }
});
document.getElementById("gateCancelBtn").addEventListener("click", () => {
  document.getElementById("gateOverlay").classList.remove("show");
});
function submitGate() {
  const val = document.getElementById("gateInput").value;
  if (val === EDIT_PASSCODE) {
    editUnlocked = true;
    document.getElementById("gateOverlay").classList.remove("show");
    document.getElementById("lockBtn").textContent = "🔓 EDIT MODE";
    document.getElementById("lockBtn").classList.add("unlocked");
    document.getElementById("subtitleText").textContent = "คุณอยู่ในโหมดแก้ไข — ผู้ที่เปิดลิงก์นี้จะเห็นแบบผู้ชมเท่านั้น";
    document.getElementById("addBtn").style.display = "flex";
    render();
  } else {
    document.getElementById("gateError").classList.add("show");
  }
}
document.getElementById("gateSubmitBtn").addEventListener("click", submitGate);
document.getElementById("gateInput").addEventListener("keydown", (e) => { if (e.key === "Enter") submitGate(); });

// init
document.getElementById("f_assigned").value = todayIso();
render();
initFirebase();
</script>
</body>
</html>
